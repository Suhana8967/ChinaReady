        <label for="city">Select City</label>

<select id="city">

<option value="2300">Beijing</option>

<option value="1400">Xi'an</option>
<option value="1500">Shenzhen</option>
<option value="1400">Suzhou</option>
<option value="1300">Harbin</option>
<option value="1400">Qingdao</option>
<option value="1200">Chongqing</option>

</select>

        <label for="months">Number of Months</label>

        <input
            type="number"
            id="months"
            min="1"
            value="12">

        <button onclick="calculateCost()">
            Calculate Cost
        </button>
